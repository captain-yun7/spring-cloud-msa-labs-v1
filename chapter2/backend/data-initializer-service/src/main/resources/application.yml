spring:
  application:
    name: data-initializer-service
  main:
    web-application-type: servlet  # 웹 애플리케이션으로 변경
    
  # 각 서비스 데이터베이스 연결 설정
  datasource:
    user-service:
      driver-class-name: org.h2.Driver
      url: jdbc:h2:file:../user-service/data/userdb
      username: sa
      password: 
      
    product-service:
      driver-class-name: org.h2.Driver
      url: jdbc:h2:file:../product-service/data/productdb
      username: sa
      password: 
      
    order-service:
      driver-class-name: org.h2.Driver
      url: jdbc:h2:file:../order-service/data/orderdb
      username: sa
      password: 
      
    payment-service:
      driver-class-name: org.h2.Driver
      url: jdbc:h2:file:../payment-service/data/paymentdb
      username: sa
      password: 
      
    notification-service:
      driver-class-name: org.h2.Driver
      url: jdbc:h2:file:../notification-service/data/notificationdb
      username: sa
      password: 

server:
  port: 8090  # 다른 서비스와 겹치지 않는 포트

logging:
  level:
    com.captainyun7.initializer: INFO
    org.springframework: WARN

# Swagger UI 설정
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html 